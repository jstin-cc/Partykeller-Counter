<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SV Partykeller – Anmeldung</title>
<link rel="icon" href="assets/cones-flat.png">
<link rel="stylesheet" href="css/theme.css">
<style>
  .login-watermark {
    position: absolute;
    left: -140px;
    top: -100px;
    width: 520px;
    height: 520px;
    background: url('assets/zapfen-bg.svg') no-repeat center / contain;
    opacity: 0.22;
    pointer-events: none;
    z-index: 0;
  }
  .user-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-edge);
    border-radius: var(--radius);
    padding: 13px 16px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    font-family: 'Work Sans', sans-serif;
  }
  .user-row:hover { background: var(--surface-2); }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bitter', serif;
    font-weight: 700;
    color: var(--gold);
    font-size: 17px;
    flex-shrink: 0;
  }
  .pin-row { display: flex; gap: 8px; padding: 10px 4px 4px 4px; }
  .input-flat {
    background: var(--surface-2);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-edge);
    border-radius: var(--radius);
    padding: 13px 16px;
    color: var(--ink);
    font-size: 16px;
    width: 100%;
  }
  .btn-green {
    background: var(--green);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-weight: 700;
    cursor: pointer;
    font-family: 'Work Sans', sans-serif;
  }
  .error-banner {
    background: oklch(0.3 0.1 38 / 0.4);
    color: var(--ink);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="login-watermark"></div>

  <div class="screen-inner" style="padding:32px 24px;gap:22px;">

    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;">
      <img src="assets/logo.png" alt="SV Partykeller" style="height:76px;width:auto;object-fit:contain;">
      <div>
        <h1 style="font-family:'Bitter',serif;font-weight:800;font-size:30px;color:var(--creme);margin:0 0 4px 0;">Wer bist du?</h1>
        <p style="font-size:15px;color:var(--ink-muted);margin:0;">Wähle deinen Account oder starte neu.</p>
      </div>
    </div>

    <div id="error-banner" class="error-banner" hidden></div>

    <div>
      <div style="font-family:'Bitter',serif;font-weight:600;font-size:14px;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;border-bottom:2px solid var(--green);padding-bottom:8px;margin-bottom:12px;">Dein Konto</div>
      <div id="user-list" style="display:flex;flex-direction:column;gap:8px;"></div>
      <div id="list-empty" hidden style="color:var(--ink-muted);font-size:14px;">Noch niemand da – leg unten los.</div>
    </div>

    <div style="display:flex;align-items:center;gap:12px;color:var(--ink-muted);font-size:13px;">
      <div style="flex:1;height:1px;background:oklch(0.95 0.01 95 / 0.15);"></div>
      oder neu anmelden
      <div style="flex:1;height:1px;background:oklch(0.95 0.01 95 / 0.15);"></div>
    </div>

    <form id="create-form" style="display:flex;flex-direction:column;gap:10px;">
      <input id="create-name" class="input-flat" type="text" maxlength="24" placeholder="Dein Name" autocomplete="off" required>
      <input id="create-pin" class="input-flat num" type="password" inputmode="numeric" pattern="\d{4}" maxlength="4" placeholder="PIN (4 Ziffern)" autocomplete="off" required>
      <button class="btn-green" style="padding:15px;font-size:16px;margin-top:4px;">Konto erstellen &amp; los</button>
    </form>

    <a href="/admin" style="text-align:center;font-size:13px;text-decoration:none;margin-top:auto;padding-top:12px;">Admin-Zugang</a>
  </div>

  <img src="assets/footer-woods.png" alt="" class="footer-woods">
</div>

<script type="module">
import { post, fetchState, setSession } from './js/api.js';

const $ = (id) => document.getElementById(id);
let selectedId = null;

function showError(msg) {
  const el = $('error-banner');
  el.textContent = msg;
  el.hidden = !msg;
}

function renderUsers(players) {
  const list = $('user-list');
  list.textContent = '';
  $('list-empty').hidden = players.length > 0;

  for (const p of players) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;';

    const row = document.createElement('button');
    row.type = 'button';
    row.className = 'user-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = p.name.charAt(0).toUpperCase();

    const name = document.createElement('div');
    name.style.cssText = 'flex:1;font-size:16px;font-weight:600;color:var(--ink);';
    name.textContent = p.name;

    const chevron = document.createElement('div');
    chevron.style.cssText = 'color:var(--green);font-size:20px;';
    chevron.textContent = '›';

    row.append(avatar, name, chevron);
    wrap.appendChild(row);

    row.addEventListener('click', () => {
      selectedId = p.id;
      showError('');
      renderUsers(players); // schließt andere PIN-Zeilen
    });

    if (selectedId === p.id) {
      const pinRow = document.createElement('form');
      pinRow.className = 'pin-row';

      const pin = document.createElement('input');
      pin.type = 'password';
      pin.inputMode = 'numeric';
      pin.maxLength = 4;
      pin.placeholder = 'PIN';
      pin.autocomplete = 'off';
      pin.required = true;
      pin.className = 'input-flat num';
      pin.style.flex = '1';

      const ok = document.createElement('button');
      ok.className = 'btn-green';
      ok.style.cssText = 'padding:12px 20px;font-size:15px;';
      ok.textContent = 'OK';

      pinRow.append(pin, ok);
      pinRow.addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          const { token, player } = await post('/api/login', { playerId: p.id, pin: pin.value });
          setSession(token, player.id);
          location.href = '/dashboard';
        } catch (err) {
          showError(err.message === 'Name oder PIN falsch' ? 'Falsche PIN.' : err.message);
        }
      });
      wrap.appendChild(pinRow);
      queueMicrotask(() => pin.focus());
    }

    list.appendChild(wrap);
  }
}

$('create-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const { token, player } = await post('/api/players', { name: $('create-name').value, pin: $('create-pin').value });
    setSession(token, player.id);
    location.href = '/dashboard';
  } catch (err) {
    showError(err.message);
  }
});

fetchState()
  .then(({ players }) => renderUsers(players))
  .catch(() => showError('Server nicht erreichbar.'));
</script>
</body>
</html>
