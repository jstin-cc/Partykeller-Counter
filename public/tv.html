<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SV Partykeller – Scoreboard</title>
<link rel="icon" href="assets/cones-flat.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#010f05">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="stylesheet" href="css/theme.css">
<script src="js/vendor/qrcode.js"></script>
<style>
  :root {
    --bg-lo: oklch(0.11 0.03 155);
    --surface-hi: oklch(0.30 0.022 160 / 0.58);
  }
  html, body { height: 100%; }
  body { overflow: hidden; }
  .tv {
    width: 100vw;
    height: 100vh;
    background: var(--bg);
    overflow: hidden;
    position: relative;
  }
  .tv-mark {
    position: absolute;
    background: url('assets/zapfen-bg.svg') no-repeat center / contain;
  }
  .podium-card {
    background: linear-gradient(180deg, var(--surface-hi), var(--surface));
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-edge);
    border-radius: var(--radius-lg);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }
  .podium-badge {
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bitter', serif;
    font-weight: 800;
    color: var(--bg);
    z-index: 1;
  }
  /* Rangliste ab Platz 4: großes gerundetes Panel, darin einzeln
     abgerundete Zeilen, die als Fenster durchscrollen. */
  .table-panel {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    background: var(--surface-alt);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    overflow: hidden;
  }
  .rest-viewport { flex: 1; min-height: 0; overflow: hidden; position: relative; }
  .rest-track { position: absolute; left: 0; right: 0; top: 0; display: flex; flex-direction: column; gap: 8px; }
  .row {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 0 24px;
    flex: 0 0 auto;
    position: relative;
    border: 1px solid var(--glass-edge);
    border-radius: var(--radius);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
  }
  .row:nth-child(odd) { background: var(--surface); }
  .row:nth-child(even) { background: var(--surface-alt); }
  /* kurzes Aufleuchten der Zeile, wenn sich ihr Wert erhöht */
  .row.pk-rowflash::after {
    content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    animation: pk-rowflash 0.85s ease;
  }
  @keyframes pk-rowflash {
    0%   { background: oklch(0.80 0.15 83 / 0); }
    30%  { background: oklch(0.80 0.15 83 / 0.20); }
    100% { background: oklch(0.80 0.15 83 / 0); }
  }
  @media (prefers-reduced-motion: reduce) { .row.pk-rowflash::after { animation: none; } }
  .col-rank { width: 70px; font-family:'Bitter',serif; font-weight:700; font-size:24px; color:var(--ink-muted); font-variant-numeric:tabular-nums; }
  .col-name { flex: 1; font-family:'Bitter',serif; font-weight:700; font-size:28px; }
  .col-beer { width:120px; text-align:right; font-family:'Bitter',serif; font-weight:700; font-size:28px; color:var(--amber); font-variant-numeric:tabular-nums; }
  .col-shot { width:120px; text-align:right; font-family:'Bitter',serif; font-weight:700; font-size:28px; color:var(--brick); font-variant-numeric:tabular-nums; }
  .col-mix { width:120px; text-align:right; font-family:'Bitter',serif; font-weight:700; font-size:28px; color:var(--mix); font-variant-numeric:tabular-nums; }
  .col-total { width:140px; text-align:right; font-family:'Bitter',serif; font-weight:800; font-size:34px; color:var(--gold); text-shadow:0 0 10px oklch(0.80 0.15 83 / 0.25); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<div class="tv">
  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
    <!-- Zapfen-Wasserzeichen rechts (wie zuvor bevorzugt), nicht mittig -->
    <div class="tv-mark" style="right:-220px;top:-180px;width:900px;height:900px;opacity:0.20;transform:rotate(-8deg);"></div>
    <div class="tv-mark" style="right:360px;bottom:-140px;width:420px;height:420px;opacity:0.12;transform:rotate(12deg);"></div>
  </div>

  <div style="position:relative;z-index:1;display:flex;flex-direction:column;gap:16px;height:100%;padding:32px 64px 0 64px;">

    <div style="display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:22px;">
        <img src="assets/logo.png" alt="SV Partykeller" style="height:80px;width:auto;object-fit:contain;flex-shrink:0;">
        <div>
          <div style="font-family:'Bitter',serif;font-weight:800;font-size:36px;color:var(--creme);line-height:1.1;">Getränke-Counter</div>
          <div id="board-subtitle" style="font-family:'Bitter',serif;font-weight:600;font-size:16px;color:var(--green);letter-spacing:0.1em;text-transform:uppercase;transition:color 0.3s ease;">All-Time Rangliste</div>
        </div>
      </div>
      <div style="text-align:center;">
        <div id="participant-count" class="num" style="font-size:22px;color:var(--creme);font-weight:700;">0 Teilnehmer</div>
        <div id="totals" style="font-size:14px;color:var(--ink-muted);margin-top:4px;font-variant-numeric:tabular-nums;">0 Bier · 0 Shots gesamt</div>
      </div>
      <div class="glass" style="display:flex;align-items:center;gap:16px;padding:12px 16px;background:var(--surface-alt);border-radius:var(--radius-lg);">
        <div style="font-size:14px;color:var(--creme);text-align:right;line-height:1.4;font-family:'Bitter',serif;font-weight:600;">Scan zum<br>Beitreten</div>
        <div id="qr" style="width:90px;height:90px;border-radius:0;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;"></div>
      </div>
    </div>

    <div id="board" style="display:flex;flex-direction:column;gap:16px;flex:1;min-height:0;">

    <div id="podium" style="display:flex;align-items:flex-end;justify-content:center;gap:32px;flex-shrink:0;height:224px;">
      <div id="pod-2" hidden style="width:250px;display:flex;flex-direction:column;align-items:center;">
        <div class="podium-badge" style="width:56px;height:56px;font-size:22px;background:oklch(0.78 0.015 240);margin-bottom:-28px;box-shadow:0 0 16px oklch(0.78 0.015 240 / 0.4);">2</div>
        <div class="podium-card" style="border-top:3px solid oklch(0.78 0.015 240);padding:40px 18px 14px 18px;height:148px;gap:2px;">
          <div data-f="name" style="font-family:'Bitter',serif;font-weight:700;font-size:23px;"></div>
          <div data-f="total" class="num" style="font-size:46px;line-height:1;color:var(--gold);text-shadow:0 0 20px oklch(0.80 0.15 83 / 0.35);"></div>
          <div style="font-size:13px;"><span data-f="beers" style="color:var(--amber);"></span> <span style="color:var(--ink-muted);">·</span> <span data-f="shots" style="color:var(--brick);"></span> <span style="color:var(--ink-muted);">·</span> <span data-f="mixes" style="color:var(--mix);"></span></div>
        </div>
      </div>
      <div id="pod-1" hidden style="width:300px;display:flex;flex-direction:column;align-items:center;">
        <div class="podium-badge" style="width:70px;height:70px;font-size:30px;background:var(--gold);margin-bottom:-35px;box-shadow:0 0 28px oklch(0.80 0.15 83 / 0.6);">1</div>
        <div class="podium-card" style="border-top:4px solid var(--gold);padding:46px 20px 14px 20px;height:196px;gap:4px;">
          <div data-f="name" style="font-family:'Bitter',serif;font-weight:800;font-size:28px;"></div>
          <div data-f="total" class="num" style="font-size:66px;line-height:1;color:var(--gold);text-shadow:0 0 46px oklch(0.80 0.15 83 / 0.65);"></div>
          <div style="font-size:14px;"><span data-f="beers" style="color:var(--amber);"></span> <span style="color:var(--ink-muted);">·</span> <span data-f="shots" style="color:var(--brick);"></span> <span style="color:var(--ink-muted);">·</span> <span data-f="mixes" style="color:var(--mix);"></span></div>
        </div>
      </div>
      <div id="pod-3" hidden style="width:240px;display:flex;flex-direction:column;align-items:center;">
        <div class="podium-badge" style="width:52px;height:52px;font-size:21px;background:oklch(0.64 0.09 45);margin-bottom:-26px;box-shadow:0 0 16px oklch(0.64 0.09 45 / 0.4);">3</div>
        <div class="podium-card" style="border-top:3px solid oklch(0.64 0.09 45);padding:38px 18px 12px 18px;height:130px;gap:2px;">
          <div data-f="name" style="font-family:'Bitter',serif;font-weight:700;font-size:21px;"></div>
          <div data-f="total" class="num" style="font-size:38px;line-height:1;color:var(--gold);text-shadow:0 0 14px oklch(0.80 0.15 83 / 0.3);"></div>
          <div style="font-size:12px;"><span data-f="beers" style="color:var(--amber);"></span> <span style="color:var(--ink-muted);">·</span> <span data-f="shots" style="color:var(--brick);"></span> <span style="color:var(--ink-muted);">·</span> <span data-f="mixes" style="color:var(--mix);"></span></div>
        </div>
      </div>
    </div>

    <div class="glass table-panel">
      <div style="display:flex;align-items:center;gap:28px;padding:0 24px 12px 24px;text-transform:uppercase;letter-spacing:0.08em;font-size:14px;color:var(--gold);flex-shrink:0;">
        <div style="width:70px;">Rang</div>
        <div style="flex:1;">Name</div>
        <div style="width:120px;text-align:right;">Bier</div>
        <div style="width:120px;text-align:right;">Shots</div>
        <div style="width:120px;text-align:right;">Mischen</div>
        <div style="width:140px;text-align:right;">Gesamt</div>
      </div>
      <div id="rest" class="rest-viewport"></div>
    </div>

    </div><!-- /#board -->

    <!-- Fun-Facts (live): kompaktes Band direkt über den Bäumen, verdeckt sie nicht -->
    <div id="funfacts" class="glass" style="flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:16px;padding:9px 24px;background:var(--surface-alt);border-top:3px solid var(--gold);border-radius:var(--radius-lg);">
      <span id="funfact-title" style="font-family:'Bitter',serif;font-weight:800;font-size:15px;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;flex-shrink:0;transition:opacity 0.4s;">Fun Fact</span>
      <span id="funfact-text" style="font-size:18px;color:var(--creme);font-family:'Bitter',serif;font-weight:600;transition:opacity 0.4s;">Bald gibt's hier Statistiken.</span>
    </div>

    <img src="assets/footer-woods.png" alt="" style="width:calc(100% + 128px);margin-left:-64px;height:96px;object-fit:cover;object-position:center 30%;display:block;flex-shrink:0;filter:brightness(0.85) saturate(1);">
  </div>
</div>

<script type="module">
import { connectState } from './js/ws-client.js';

const $ = (id) => document.getElementById(id);

// --- QR-Code zum Beitreten ---
// Zieladresse ist die vom Admin gesetzte joinUrl; ohne Vorgabe die
// Startseite dieses Servers (auf dem Pi z. B. http://partykeller.local:3000/).
let currentQrUrl = null;
function renderQr(url) {
  if (url === currentQrUrl) return;
  currentQrUrl = url;
  const qr = qrcode(0, 'M');
  qr.addData(url);
  qr.make();
  $('qr').innerHTML = qr.createSvgTag({ cellSize: 3, margin: 2, scalable: true });
  $('qr').firstElementChild.style.cssText = 'width:100%;height:100%;display:block;';
}

// kurze Animationen (Reflow erzwingt Neustart)
function pop(el) { el.classList.remove('pk-pop'); void el.offsetWidth; el.classList.add('pk-pop'); }
function flash(el) { el.classList.remove('pk-flash'); void el.offsetWidth; el.classList.add('pk-flash'); }

const prevPod = { 1: null, 2: null, 3: null };

function fillPodium(el, p, slot) {
  el.hidden = !p;
  if (!p) { prevPod[slot] = null; return; }
  const totalEl = el.querySelector('[data-f=total]');
  el.querySelector('[data-f=name]').textContent = p.name;
  totalEl.textContent = p.total;
  el.querySelector('[data-f=beers]').textContent = `${p.beers} Bier`;
  el.querySelector('[data-f=shots]').textContent = `${p.shots} Shots`;
  el.querySelector('[data-f=mixes]').textContent = `${p.mixes} Mische`;

  const prev = prevPod[slot];
  if (!modeSwitching && prev && prev.id === p.id && p.total > prev.total) {
    pop(totalEl);                                    // gleicher Mensch, mehr Getränke
  } else if (!modeSwitching && prev && prev.id !== p.id) {
    flash(el.querySelector('.podium-card'));         // neue:r auf diesem Podestplatz
  }
  prevPod[slot] = { id: p.id, total: p.total };
}

// --- Rangliste ab Platz 4: max. 5 gleichzeitig sichtbar ---
// Bei mehr als 5 scrollt das Fenster Zeile für Zeile nach unten; unten
// angekommen springt es schnell wieder ganz nach oben und beginnt von vorne
// (kein endloses Durchlaufen).
const WINDOW = 5;
const GAP = 8;            // px zwischen den Zeilen (muss zu .rest-track passen)
const SCROLL_MS = 650;    // sanft eine Zeile weiter
const RESET_MS = 900;     // schnell zurück nach oben

// Verweildauer pro Schritt: im Admin einstellbar (setScrollSpeed), kommt im State
let stepMs = 3200;

let others = [];          // Spieler ab Platz 4 (aktuellster State)
let prevOthers = [];      // vorheriger 4+-Stand (Diff: Umsortierung erkennen)
let prevVals = {};        // id -> {beers,shots,mixes,total} (Pop bei Anstieg)
let track = null;
let rowH = 0;
let pos = 0;
let maxPos = 0;
let scrollTimer = null;
let modeSwitching = false; // beim Moduswechsel keine Zeilen-Animation (Slide übernimmt)

function popEl(el) { el.classList.remove('pk-pop'); void el.offsetWidth; el.classList.add('pk-pop'); }
function rowFlash(el) { el.classList.remove('pk-rowflash'); void el.offsetWidth; el.classList.add('pk-rowflash'); }

// prev = Vorwerte desselben Spielers; gestiegene Zähler bekommen direkt „Pop",
// die ganze Zeile leuchtet kurz auf.
function buildRow(p, prev) {
  const row = document.createElement('div');
  row.className = 'row';
  row.dataset.id = p.id;
  for (const [cls, text, key] of [
    ['col-rank', p.rank, null],
    ['col-name', p.name, null],
    ['col-beer', p.beers, 'beers'],
    ['col-shot', p.shots, 'shots'],
    ['col-mix', p.mixes, 'mixes'],
    ['col-total', p.total, 'total'],
  ]) {
    const cell = document.createElement('div');
    cell.className = cls;
    cell.textContent = text;
    if (key && prev && p[key] > prev[key]) cell.classList.add('pk-pop');
    row.appendChild(cell);
  }
  if (prev && p.total > prev.total) row.classList.add('pk-rowflash');
  return row;
}

function stopScroll() {
  if (scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; }
}

function scrollStep() {
  if (maxPos <= 0) return;
  if (pos >= maxPos) {
    // Ende erreicht: schnell zurück nach oben und von vorne
    track.style.transition = `transform ${RESET_MS}ms ease-in-out`;
    pos = 0;
  } else {
    track.style.transition = `transform ${SCROLL_MS}ms ease`;
    pos += 1;
  }
  track.style.transform = `translateY(${-pos * (rowH + GAP)}px)`;
}

function sameIds(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) if (a[i].id !== b[i].id) return false;
  return true;
}

// Reihenfolge unverändert: Werte in den vorhandenen Zeilen aktualisieren, ohne
// neu aufzubauen. Die Scrollposition bleibt erhalten, gestiegene Zähler poppen.
function updateRowsInPlace(list) {
  for (let i = 0; i < list.length; i++) {
    const p = list[i];
    const el = track.children[i];
    if (!el) continue;
    const prev = prevVals[p.id];
    const set = (cls, val, key) => {
      const cell = el.querySelector('.' + cls);
      if (cell.textContent !== String(val)) cell.textContent = val;
      if (key && prev && val > prev[key]) popEl(cell);
    };
    set('col-rank', p.rank);
    set('col-name', p.name);
    set('col-beer', p.beers, 'beers');
    set('col-shot', p.shots, 'shots');
    set('col-mix', p.mixes, 'mixes');
    set('col-total', p.total, 'total');
    if (prev && p.total > prev.total) rowFlash(el);
  }
}

// Reihenfolge/Menge geändert: neu aufbauen. Bei Umsortierung gleiten die Zeilen
// per FLIP von ihrer alten an die neue Position.
function rebuildRest(animate) {
  const viewport = $('rest');
  const oldTop = {};
  if (track) for (const r of track.children) oldTop[r.dataset.id] = r.getBoundingClientRect().top;

  stopScroll();
  viewport.textContent = '';
  pos = 0;
  if (others.length === 0) { track = null; return; }

  track = document.createElement('div');
  track.className = 'rest-track';
  for (const p of others) track.appendChild(buildRow(p, modeSwitching ? null : prevVals[p.id]));
  viewport.appendChild(track);

  // Zeilenhöhe immer am 5er-Raster ausrichten, damit Zeilen bei weniger
  // Einträgen (z. B. Heute-Ansicht) nicht ins Riesige gestreckt werden
  const visible = Math.min(WINDOW, others.length);
  const vh = viewport.clientHeight;
  rowH = (vh - (WINDOW - 1) * GAP) / WINDOW;
  for (const r of track.children) r.style.height = `${rowH}px`;
  track.style.transition = 'none';
  track.style.transform = 'translateY(0)';

  if (animate && !modeSwitching) {
    for (const r of track.children) {
      const id = r.dataset.id;
      const newTop = r.getBoundingClientRect().top;
      if (oldTop[id] != null) {
        const delta = oldTop[id] - newTop;
        if (delta) {
          r.style.transform = `translateY(${delta}px)`;
          requestAnimationFrame(() => {
            r.style.transition = 'transform 0.55s cubic-bezier(0.2, 0.8, 0.2, 1)';
            r.style.transform = 'translateY(0)';
          });
        }
      } else {
        r.style.opacity = '0';               // neue Zeile: sanft einblenden
        requestAnimationFrame(() => { r.style.transition = 'opacity 0.55s ease'; r.style.opacity = '1'; });
      }
    }
  }

  maxPos = others.length - visible;
  if (maxPos > 0) scrollTimer = setInterval(scrollStep, stepMs);
}

// Geschwindigkeit geändert (Admin): laufende Rotation mit neuem Takt fortsetzen
function applyScrollSpeed(seconds) {
  const ms = Math.round((Number(seconds) || 3.2) * 1000);
  if (ms === stepMs) return;
  stepMs = ms;
  if (scrollTimer) {
    clearInterval(scrollTimer);
    scrollTimer = setInterval(scrollStep, stepMs);
  }
}

// Einstieg: In-Place-Update bei gleicher Reihenfolge, sonst Neuaufbau mit FLIP.
function updateRest(newOthers) {
  const reorder = modeSwitching || !track || !sameIds(prevOthers, newOthers);
  others = newOthers;
  if (reorder) rebuildRest(prevOthers.length > 0);
  else updateRowsInPlace(newOthers);

  prevVals = {};
  for (const p of newOthers) prevVals[p.id] = { beers: p.beers, shots: p.shots, mixes: p.mixes, total: p.total };
  prevOthers = newOthers;
}

// --- Board-Modus (All-Time / Heute), im Admin umschaltbar ---
let currentMode = null;

function metricsFor(p, mode) {
  return mode === 'today'
    ? { beers: p.beersToday, shots: p.shotsToday, mixes: p.mixesToday,
        total: p.beersToday + p.shotsToday + p.mixesToday }
    : { beers: p.beers, shots: p.shots, mixes: p.mixes, total: p.total };
}

// Modus bestimmt, wer auf dem Board steht:
//  - alltime: alle mit Haken im Admin (der Haken gilt nur für die Gesamtansicht)
//  - today:   alle, die heute mindestens ein Getränk geloggt haben
function boardRows(players, mode) {
  const rows = players
    .map((p) => ({ id: p.id, name: p.name, hidden: p.hidden, ...metricsFor(p, mode) }))
    .filter((r) => (mode === 'today' ? r.total > 0 : !r.hidden));
  rows.sort((a, b) => b.total - a.total || a.name.localeCompare(b.name, 'de'));
  rows.forEach((r, i) => { r.rank = i + 1; });
  return rows;
}

function applyState(state, mode) {
  const rows = boardRows(state.players, mode);

  $('board-subtitle').textContent = mode === 'today' ? 'Rangliste heute' : 'All-Time Rangliste';
  $('participant-count').textContent = mode === 'today'
    ? `${rows.length} heute dabei`
    : `${rows.length} Teilnehmer`;
  const beers = rows.reduce((s, r) => s + r.beers, 0);
  const shots = rows.reduce((s, r) => s + r.shots, 0);
  const mixes = rows.reduce((s, r) => s + r.mixes, 0);
  const suffix = mode === 'today' ? 'heute' : 'gesamt';
  $('totals').textContent = `${beers} Bier · ${shots} Shots · ${mixes} Mische ${suffix}`;

  fillPodium($('pod-1'), rows[0], 1);
  fillPodium($('pod-2'), rows[1], 2);
  fillPodium($('pod-3'), rows[2], 3);

  updateRest(rows.slice(3));
  updateFacts(state.players.filter((p) => !p.hidden), state.records, state.customFacts);
}

// Moduswechsel: das ganze Board fährt raus und das neue fährt wieder ein
function slideSwap(rebuild) {
  const board = $('board');
  board.style.transition = 'transform 0.32s ease, opacity 0.32s ease';
  board.style.transform = 'translateX(-70px)';
  board.style.opacity = '0';
  setTimeout(() => {
    modeSwitching = true;
    rebuild();
    modeSwitching = false;
    board.style.transition = 'none';
    board.style.transform = 'translateX(70px)';
    void board.offsetWidth;
    board.style.transition = 'transform 0.32s ease, opacity 0.32s ease';
    board.style.transform = 'translateX(0)';
    board.style.opacity = '1';
  }, 340);
}

connectState({
  onState(state) {
    const { joinUrl, boardMode } = state;
    renderQr((joinUrl && joinUrl.length ? joinUrl : location.origin + '/'));
    applyScrollSpeed(state.scrollSeconds);
    const mode = boardMode === 'today' ? 'today' : 'alltime';

    if (currentMode !== null && mode !== currentMode) {
      slideSwap(() => { currentMode = mode; applyState(state, mode); });
    } else {
      currentMode = mode;
      applyState(state, mode);
    }
  },
});

// --- Fun-Facts (live) ---
// Jeder Eintrag ist { title, text }: berechnete Facts (Rekorde, Tages-
// Bestleistungen) plus die vom Admin gepflegten eigenen Meldungen.
// „Heute" = Party-Tag 06:00–05:59 (kommt schon aggregiert vom Server).
const FUNFACT_FALLBACK = { title: 'Fun Fact', text: 'Heute noch nichts getrunken – auf geht’s!' };
let facts = [];
let factIdx = 0;
const factEl = $('funfact-text');
const factTitleEl = $('funfact-title');

function leaderBy(players, key) {
  let best = null;
  for (const p of players) {
    const v = p[key] || 0;
    if (v > 0 && (!best || v > (best[key] || 0))) best = p;
  }
  return best;
}

// '2026-09-25' -> '25.09.2026'
function fmtDay(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}.${m}.${y}`;
}

function computeFacts(players, records, customFacts) {
  const out = [];
  const fact = (text) => out.push({ title: 'Fun Fact', text });

  // All-Time-Rekorde: meiste Getränke an einem einzelnen Abend, schön formuliert
  if (records) {
    if (records.beer) fact(`Bier-Rekord: Die meisten Biere an einem Abend hat ${records.beer.name} am ${fmtDay(records.beer.day)} geschafft – ganze ${records.beer.n} Stück.`);
    if (records.shot) fact(`Shot-Rekord: ${records.shot.name} kippte am ${fmtDay(records.shot.day)} sagenhafte ${records.shot.n} Shots an einem Abend.`);
    if (records.mix) fact(`Mische-Rekord: ${records.mix.name} mixte am ${fmtDay(records.mix.day)} ${records.mix.n} Mischgetränke an einem Abend.`);
  }

  // Eigene Meldungen aus dem Admin (mit eigenem Titel)
  for (const f of customFacts ?? []) out.push({ title: f.title, text: f.text });

  // Tages-Bestleistungen (heute)
  const b = leaderBy(players, 'beersToday');
  if (b) fact(`Bier-König des Abends: ${b.name} mit ${b.beersToday} Bier.`);
  const s = leaderBy(players, 'shotsToday');
  if (s) fact(`Shot-Meister des Abends: ${s.name} mit ${s.shotsToday} Shots.`);
  const m = leaderBy(players, 'mixesToday');
  if (m) fact(`Misch-Meister des Abends: ${m.name} mit ${m.mixesToday} Mischen.`);
  let top = null, topN = 0;
  for (const p of players) {
    const n = (p.beersToday || 0) + (p.shotsToday || 0) + (p.mixesToday || 0);
    if (n > topN) { topN = n; top = p; }
  }
  if (top) fact(`Fleißigste:r heute: ${top.name} mit ${topN} Getränken.`);
  return out;
}

function currentFactList() {
  return facts.length ? facts : [FUNFACT_FALLBACK];
}

function showFact(f) {
  factTitleEl.textContent = f.title;
  factEl.textContent = f.text;
}

function updateFacts(players, records, customFacts) {
  facts = computeFacts(players, records, customFacts);
  const list = currentFactList();
  factIdx %= list.length;
  showFact(list[factIdx]);
}

setInterval(() => {
  const list = currentFactList();
  factIdx = (factIdx + 1) % list.length;
  factEl.style.opacity = '0';
  factTitleEl.style.opacity = '0';
  setTimeout(() => {
    showFact(list[factIdx]);
    factEl.style.opacity = '1';
    factTitleEl.style.opacity = '1';
  }, 400);
}, 7000);
</script>
