<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SV Partykeller – Scoreboard</title>
<link rel="icon" href="assets/cones-flat.png">
<link rel="stylesheet" href="css/theme.css">
<script src="js/vendor/qrcode.js"></script>
<style>
  :root {
    --bg-lo: oklch(0.11 0.03 155);
    --surface-hi: oklch(0.32 0.045 55);
  }
  html, body { height: 100%; }
  body { overflow: hidden; }
  .tv {
    width: 100vw;
    height: 100vh;
    background: var(--bg);
    overflow: hidden;
    position: relative;
  }
  .tv-mark {
    position: absolute;
    background: url('assets/zapfen-bg.svg') no-repeat center / contain;
  }
  .podium-card {
    background: linear-gradient(180deg, var(--surface-hi), var(--surface));
    border-radius: var(--radius-lg);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }
  .podium-badge {
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bitter', serif;
    font-weight: 800;
    color: var(--bg);
    z-index: 1;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 0 28px;
    flex: 1;
    min-height: 0;
  }
  .row:nth-child(odd) { background: var(--surface); }
  .row:nth-child(even) { background: var(--surface-alt); }
  .col-rank { width: 70px; font-family:'Bitter',serif; font-weight:700; font-size:24px; color:var(--ink-muted); font-variant-numeric:tabular-nums; }
  .col-name { flex: 1; font-family:'Bitter',serif; font-weight:700; font-size:28px; }
  .col-beer { width:130px; text-align:right; font-family:'Bitter',serif; font-weight:700; font-size:28px; color:var(--amber); font-variant-numeric:tabular-nums; }
  .col-shot { width:130px; text-align:right; font-family:'Bitter',serif; font-weight:700; font-size:28px; color:var(--brick); font-variant-numeric:tabular-nums; }
  .col-total { width:150px; text-align:right; font-family:'Bitter',serif; font-weight:800; font-size:34px; color:var(--gold); text-shadow:0 0 10px oklch(0.80 0.15 83 / 0.25); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<div class="tv">
  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
    <div class="tv-mark" style="left:485px;top:-225px;width:950px;height:950px;opacity:0.20;"></div>
    <div class="tv-mark" style="left:1660px;top:-140px;width:420px;height:420px;opacity:0.14;transform:rotate(-15deg);"></div>
    <div class="tv-mark" style="left:-160px;top:860px;width:380px;height:380px;opacity:0.14;transform:rotate(8deg);"></div>
  </div>

  <div style="position:relative;z-index:1;display:flex;flex-direction:column;gap:22px;height:100%;padding:36px 64px 0 64px;">

    <div style="display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:22px;">
        <img src="assets/logo.png" alt="SV Partykeller" style="height:80px;width:auto;object-fit:contain;flex-shrink:0;">
        <div>
          <div style="font-family:'Bitter',serif;font-weight:800;font-size:36px;color:var(--creme);line-height:1.1;">Getränke-Counter</div>
          <div style="font-family:'Bitter',serif;font-weight:600;font-size:16px;color:var(--green);letter-spacing:0.1em;text-transform:uppercase;">All-Time Rangliste</div>
        </div>
      </div>
      <div style="text-align:center;">
        <div id="participant-count" class="num" style="font-size:22px;color:var(--creme);font-weight:700;">0 Teilnehmer</div>
        <div id="totals" style="font-size:14px;color:var(--ink-muted);margin-top:4px;font-variant-numeric:tabular-nums;">0 Bier · 0 Shots gesamt</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="font-size:14px;color:var(--ink-muted);text-align:right;line-height:1.4;">Scan zum<br>Beitreten</div>
        <div id="qr" style="width:90px;height:90px;border-radius:var(--radius);overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;"></div>
      </div>
    </div>

    <div id="podium" style="display:flex;align-items:flex-end;justify-content:center;gap:36px;flex-shrink:0;height:380px;">
      <div id="pod-2" hidden style="width:310px;display:flex;flex-direction:column;align-items:center;">
        <div class="podium-badge" style="width:66px;height:66px;font-size:26px;background:oklch(0.78 0.015 240);margin-bottom:-33px;box-shadow:0 0 16px oklch(0.78 0.015 240 / 0.4);">2</div>
        <div class="podium-card" style="border-top:3px solid oklch(0.78 0.015 240);padding:36px 20px 18px 20px;height:250px;gap:4px;">
          <div data-f="name" style="font-family:'Bitter',serif;font-weight:700;font-size:27px;"></div>
          <div data-f="total" class="num" style="font-size:64px;line-height:1;color:var(--gold);text-shadow:0 0 20px oklch(0.80 0.15 83 / 0.35);"></div>
          <div style="font-size:16px;"><span data-f="beers" style="color:var(--amber);"></span> <span style="color:var(--ink-muted);">·</span> <span data-f="shots" style="color:var(--brick);"></span></div>
        </div>
      </div>
      <div id="pod-1" hidden style="width:380px;display:flex;flex-direction:column;align-items:center;">
        <div class="podium-badge" style="width:86px;height:86px;font-size:36px;background:var(--gold);margin-bottom:-43px;box-shadow:0 0 28px oklch(0.80 0.15 83 / 0.6);">1</div>
        <div class="podium-card" style="border-top:4px solid var(--gold);padding:44px 22px 20px 22px;height:340px;gap:6px;">
          <div data-f="name" style="font-family:'Bitter',serif;font-weight:800;font-size:33px;"></div>
          <div data-f="total" class="num" style="font-size:118px;line-height:1;color:var(--gold);text-shadow:0 0 46px oklch(0.80 0.15 83 / 0.65);"></div>
          <div style="font-size:17px;"><span data-f="beers" style="color:var(--amber);"></span> <span style="color:var(--ink-muted);">·</span> <span data-f="shots" style="color:var(--brick);"></span></div>
        </div>
      </div>
      <div id="pod-3" hidden style="width:290px;display:flex;flex-direction:column;align-items:center;">
        <div class="podium-badge" style="width:62px;height:62px;font-size:24px;background:oklch(0.64 0.09 45);margin-bottom:-31px;box-shadow:0 0 16px oklch(0.64 0.09 45 / 0.4);">3</div>
        <div class="podium-card" style="border-top:3px solid oklch(0.64 0.09 45);padding:32px 20px 16px 20px;height:195px;gap:4px;">
          <div data-f="name" style="font-family:'Bitter',serif;font-weight:700;font-size:24px;"></div>
          <div data-f="total" class="num" style="font-size:50px;line-height:1;color:var(--gold);text-shadow:0 0 14px oklch(0.80 0.15 83 / 0.3);"></div>
          <div style="font-size:15px;"><span data-f="beers" style="color:var(--amber);"></span> <span style="color:var(--ink-muted);">·</span> <span data-f="shots" style="color:var(--brick);"></span></div>
        </div>
      </div>
    </div>

    <div style="flex:1;display:flex;flex-direction:column;min-height:0;">
      <div style="display:flex;align-items:center;gap:28px;padding:0 28px 10px 28px;border-bottom:1px solid var(--surface-2);text-transform:uppercase;letter-spacing:0.08em;font-size:14px;color:var(--gold);flex-shrink:0;">
        <div style="width:70px;">Rang</div>
        <div style="flex:1;">Name</div>
        <div style="width:130px;text-align:right;">Bier</div>
        <div style="width:130px;text-align:right;">Shots</div>
        <div style="width:150px;text-align:right;">Gesamt</div>
      </div>
      <div id="rest" style="display:flex;flex-direction:column;flex:1;min-height:0;"></div>
    </div>

    <img src="assets/footer-woods.png" alt="" style="width:calc(100% + 128px);margin-left:-64px;height:70px;object-fit:cover;display:block;flex-shrink:0;filter:brightness(0.8) saturate(0.95);">
  </div>
</div>

<script type="module">
import { connectState } from './js/ws-client.js';

const $ = (id) => document.getElementById(id);

// QR-Code zum Beitreten: zeigt auf die Startseite dieses Servers
// (auf dem Pi z. B. http://partykeller.local:3000/)
const qr = qrcode(0, 'M');
qr.addData(location.origin + '/');
qr.make();
$('qr').innerHTML = qr.createSvgTag({ cellSize: 3, margin: 2, scalable: true });
$('qr').firstElementChild.style.cssText = 'width:100%;height:100%;display:block;';

function fillPodium(el, p) {
  el.hidden = !p;
  if (!p) return;
  el.querySelector('[data-f=name]').textContent = p.name;
  el.querySelector('[data-f=total]').textContent = p.total;
  el.querySelector('[data-f=beers]').textContent = `${p.beers} Bier`;
  el.querySelector('[data-f=shots]').textContent = `${p.shots} Shots`;
}

connectState({
  onState({ players }) {
    $('participant-count').textContent = `${players.length} Teilnehmer`;
    const beers = players.reduce((s, p) => s + p.beers, 0);
    const shots = players.reduce((s, p) => s + p.shots, 0);
    $('totals').textContent = `${beers} Bier · ${shots} Shots gesamt`;

    fillPodium($('pod-1'), players[0]);
    fillPodium($('pod-2'), players[1]);
    fillPodium($('pod-3'), players[2]);

    const rest = $('rest');
    rest.textContent = '';
    for (const p of players.slice(3)) {
      const row = document.createElement('div');
      row.className = 'row';
      for (const [cls, text] of [
        ['col-rank', p.rank],
        ['col-name', p.name],
        ['col-beer', p.beers],
        ['col-shot', p.shots],
        ['col-total', p.total],
      ]) {
        const cell = document.createElement('div');
        cell.className = cls;
        cell.textContent = text;
        row.appendChild(cell);
      }
      rest.appendChild(row);
    }
  },
});
</script>
</body>
</html>
