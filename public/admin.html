<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SV Partykeller – Admin</title>
<link rel="icon" href="assets/cones-flat.png">
<link rel="stylesheet" href="css/theme.css">
<style>
  .admin-watermark {
    position: absolute;
    background-color: var(--bg-hi);
    -webkit-mask-image: url('assets/zapfen-bg.svg');
    mask-image: url('assets/zapfen-bg.svg');
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    pointer-events: none;
    z-index: 0;
  }
  .input-flat {
    background: var(--surface-2);
    border: none;
    border-radius: var(--radius);
    padding: 13px 16px;
    color: var(--ink);
    font-size: 16px;
  }
  .btn-green {
    background: var(--green); color: var(--bg);
    border: none; border-radius: var(--radius); font-weight: 700; cursor: pointer;
    font-family: 'Work Sans', sans-serif;
  }
  .btn-flat {
    background: var(--surface-2); border: none; color: var(--ink-muted);
    border-radius: var(--radius); cursor: pointer; font-family: 'Work Sans', sans-serif;
  }
  .error-banner {
    background: oklch(0.3 0.1 38 / 0.4); color: var(--ink);
    border-radius: var(--radius); padding: 12px 16px; font-size: 14px; font-weight: 600;
  }
  .admin-row { display: flex; align-items: center; gap: 16px; padding: 12px 20px; flex-wrap: wrap; }
  .admin-row:nth-child(odd) { background: var(--surface); }
  .admin-row:nth-child(even) { background: var(--surface-alt); }
  .stepper { width: 170px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .stepper button {
    width: 34px; height: 34px; border-radius: var(--radius); border: none; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .stepper input {
    width: 56px; text-align: center; background: var(--surface-2); border: none;
    border-radius: var(--radius); padding: 6px 4px; font-family: 'Bitter', serif; font-weight: 700;
    font-size: 17px; font-variant-numeric: tabular-nums;
  }
  .stepper input::-webkit-outer-spin-button, .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .link-btn { background: none; border: none; color: var(--ink-muted); font-size: 13px; text-decoration: underline; cursor: pointer; }
  .modal-backdrop {
    position: fixed; inset: 0; background: oklch(0.1 0.02 155 / 0.6);
    display: flex; align-items: center; justify-content: center; z-index: 10;
  }
</style>
</head>
<body>

<!-- Ansicht 1: Admin-Login (Admin Login v3) -->
<div id="login-view" class="screen">
  <div class="admin-watermark" style="left:50%;top:-260px;width:600px;height:600px;margin-left:-300px;opacity:0.07;transform:rotate(0deg);"></div>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;">
    <form id="login-form" style="width:100%;max-width:400px;background:var(--surface);border-top:4px solid var(--green);padding:36px 28px;display:flex;flex-direction:column;gap:18px;">
      <div style="text-align:center;">
        <img src="assets/logo.png" alt="SV Partykeller" style="height:64px;width:auto;object-fit:contain;margin-bottom:14px;">
        <h1 style="font-family:'Bitter',serif;font-weight:800;font-size:28px;color:var(--creme);margin:0 0 6px 0;">Admin-Zugang</h1>
        <p style="font-size:14px;color:var(--ink-muted);margin:0;">Nur für die Kellermeister.</p>
      </div>
      <div id="login-error" class="error-banner" hidden></div>
      <input id="login-pw" class="input-flat" type="password" placeholder="Passwort" autocomplete="current-password" required>
      <button class="btn-green" style="padding:15px;font-size:16px;">Anmelden</button>
      <a href="/" style="text-align:center;font-size:13px;text-decoration:none;">Zurück zur Nutzeranmeldung</a>
    </form>
  </div>
  <img src="assets/footer-woods.png" alt="" class="footer-woods">
</div>

<!-- Ansicht 2: Admin-Dashboard (Admin Dashboard v3) -->
<div id="dash-view" hidden style="min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;">
  <div class="admin-watermark" style="right:-200px;top:-160px;width:700px;height:700px;opacity:0.06;transform:rotate(20deg);"></div>

  <div style="max-width:1200px;margin:0 auto;width:100%;padding:28px 40px 0 40px;position:relative;z-index:1;flex:1;">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:16px;">
      <div style="display:flex;align-items:center;gap:18px;">
        <img src="assets/logo.png" alt="SV Partykeller" style="height:56px;width:auto;object-fit:contain;">
        <h1 style="font-family:'Bitter',serif;font-weight:800;font-size:32px;color:var(--creme);margin:0;">Admin-Dashboard</h1>
      </div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <div id="reset-done" hidden style="color:var(--green);font-size:14px;font-weight:600;">Zurückgesetzt!</div>
        <div id="dash-error" class="error-msg"></div>
        <button id="open-add" class="btn-green" style="padding:12px 22px;font-size:14px;">+ Neuer Nutzer</button>
        <div style="position:relative;overflow:hidden;border-radius:var(--radius);">
          <div id="hold-progress" style="position:absolute;inset:0;background:var(--brick);width:0%;opacity:0.35;"></div>
          <button id="reset-btn" style="position:relative;background:var(--surface-2);border:none;color:var(--brick);font-weight:700;font-size:14px;padding:12px 20px;cursor:pointer;font-family:'Work Sans',sans-serif;">Gedrückt halten: Alles zurücksetzen</button>
        </div>
        <button id="logout" class="link-btn">Abmelden</button>
      </div>
    </div>

    <div>
      <div style="display:flex;align-items:center;gap:16px;padding:0 20px 10px 20px;border-bottom:1px solid var(--surface-2);text-transform:uppercase;letter-spacing:0.08em;font-size:13px;color:var(--gold);">
        <div style="flex:1;">Name</div>
        <div style="width:170px;text-align:center;">Bier</div>
        <div style="width:170px;text-align:center;">Shots</div>
        <div style="width:90px;text-align:right;">Gesamt</div>
        <div style="width:90px;text-align:right;">&nbsp;</div>
      </div>
      <div id="rows"></div>
    </div>
  </div>
  <img src="assets/footer-woods.png" alt="" class="footer-woods" style="margin-top:24px;">
</div>

<!-- Modal: Neuer Nutzer -->
<div id="add-modal" class="modal-backdrop" hidden>
  <form id="add-form" style="background:var(--surface);border-top:4px solid var(--green);padding:28px;width:360px;display:flex;flex-direction:column;gap:14px;">
    <h2 style="font-family:'Bitter',serif;font-weight:800;font-size:22px;color:var(--creme);margin:0;">Neuer Nutzer</h2>
    <input id="add-name" class="input-flat" type="text" maxlength="24" placeholder="Name" autocomplete="off" required>
    <input id="add-pin" class="input-flat num" type="password" inputmode="numeric" pattern="\d{4}" maxlength="4" placeholder="PIN (4 Ziffern)" autocomplete="off" required>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button type="button" id="close-add" class="btn-flat" style="padding:10px 18px;">Abbrechen</button>
      <button class="btn-green" style="padding:10px 18px;">Anlegen</button>
    </div>
  </form>
</div>

<!-- Modal: PIN zurücksetzen (D-002) -->
<div id="pin-modal" class="modal-backdrop" hidden>
  <form id="pin-form" style="background:var(--surface);border-top:4px solid var(--green);padding:28px;width:360px;display:flex;flex-direction:column;gap:14px;">
    <h2 style="font-family:'Bitter',serif;font-weight:800;font-size:22px;color:var(--creme);margin:0;">PIN zurücksetzen: <span id="pin-name"></span></h2>
    <input id="pin-value" class="input-flat num" type="password" inputmode="numeric" pattern="\d{4}" maxlength="4" placeholder="Neue PIN (4 Ziffern)" autocomplete="off" required>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button type="button" id="close-pin" class="btn-flat" style="padding:10px 18px;">Abbrechen</button>
      <button class="btn-green" style="padding:10px 18px;">Speichern</button>
    </div>
  </form>
</div>

<script type="module">
import { post } from './js/api.js';
import { connectState } from './js/ws-client.js';

const $ = (id) => document.getElementById(id);
const ADMIN_TOKEN_KEY = 'pk_admin_token';
let token = sessionStorage.getItem(ADMIN_TOKEN_KEY);
let ws = null;
let players = [];
let editingId = null;

// --- Login ---
$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const res = await post('/api/admin/login', { password: $('login-pw').value });
    token = res.token;
    sessionStorage.setItem(ADMIN_TOKEN_KEY, token);
    enterDashboard();
  } catch (err) {
    const el = $('login-error');
    el.textContent = err.message === 'Falsches Passwort' ? 'Falsches Passwort.' : err.message;
    el.hidden = false;
  }
});

$('logout').addEventListener('click', () => {
  sessionStorage.removeItem(ADMIN_TOKEN_KEY);
  location.reload();
});

// --- Dashboard ---
let errTimer;
function showError(message) {
  $('dash-error').textContent = message;
  clearTimeout(errTimer);
  errTimer = setTimeout(() => { $('dash-error').textContent = ''; }, 4000);
}

function send(msg) {
  ws.send({ ...msg, token });
}

function enterDashboard() {
  $('login-view').hidden = true;
  $('dash-view').hidden = false;
  ws = connectState({
    onState(state) {
      players = state.players;
      renderRows();
    },
    onError: showError,
  });
}

function renderRows() {
  const box = $('rows');
  box.textContent = '';

  for (const p of players) {
    const row = document.createElement('div');
    row.className = 'admin-row';

    // Name / Umbenennen
    const nameCell = document.createElement('div');
    nameCell.style.cssText = 'flex:1;min-width:220px;';
    if (editingId === p.id) {
      const form = document.createElement('form');
      form.style.cssText = 'display:flex;gap:8px;align-items:center;';
      const input = document.createElement('input');
      input.value = p.name;
      input.maxLength = 24;
      input.required = true;
      input.className = 'input-flat';
      input.style.cssText = 'padding:8px 10px;font-size:15px;width:150px;';
      const save = document.createElement('button');
      save.className = 'btn-green';
      save.style.cssText = 'padding:8px 14px;font-size:13px;';
      save.textContent = 'Speichern';
      const cancel = document.createElement('button');
      cancel.type = 'button';
      cancel.className = 'btn-flat';
      cancel.style.cssText = 'padding:8px 14px;font-size:13px;';
      cancel.textContent = 'Abbrechen';
      cancel.addEventListener('click', () => { editingId = null; renderRows(); });
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        send({ type: 'renamePlayer', id: p.id, name: input.value });
        editingId = null;
      });
      form.append(input, save, cancel);
      nameCell.appendChild(form);
      queueMicrotask(() => input.focus());
    } else {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;align-items:center;gap:10px;';
      const name = document.createElement('div');
      name.style.cssText = "font-size:16px;font-weight:600;font-family:'Bitter',serif;";
      name.textContent = p.name;
      const edit = document.createElement('button');
      edit.className = 'link-btn';
      edit.textContent = 'Bearbeiten';
      edit.addEventListener('click', () => { editingId = p.id; renderRows(); });
      const pinBtn = document.createElement('button');
      pinBtn.className = 'link-btn';
      pinBtn.textContent = 'PIN';
      pinBtn.addEventListener('click', () => openPinModal(p));
      wrap.append(name, edit, pinBtn);
      nameCell.appendChild(wrap);
    }

    // Zähler-Stepper
    const stepper = (drink, value, color, onColor) => {
      const cell = document.createElement('div');
      cell.className = 'stepper';
      const dec = document.createElement('button');
      dec.textContent = '–';
      dec.style.cssText = `background:var(--surface-2);color:var(--${color});`;
      dec.addEventListener('click', () => send({ type: 'increment', playerId: p.id, drink, delta: -1 }));
      const input = document.createElement('input');
      input.type = 'number';
      input.min = 0;
      input.value = value;
      input.style.color = `var(--${color})`;
      input.addEventListener('change', () => {
        const v = Math.max(0, Math.round(Number(input.value)) || 0);
        send({ type: 'setCounter', id: p.id, drink, value: v });
      });
      const inc = document.createElement('button');
      inc.textContent = '+';
      inc.style.cssText = `background:var(--${color});color:var(--${onColor});`;
      inc.addEventListener('click', () => send({ type: 'increment', playerId: p.id, drink, delta: 1 }));
      cell.append(dec, input, inc);
      return cell;
    };

    const total = document.createElement('div');
    total.className = 'num';
    total.style.cssText = 'width:90px;text-align:right;font-size:22px;color:var(--gold);';
    total.textContent = p.total;

    const delCell = document.createElement('div');
    delCell.style.cssText = 'width:90px;text-align:right;';
    const del = document.createElement('button');
    del.textContent = 'Löschen';
    del.style.cssText = 'background:transparent;border:1px solid var(--brick);color:var(--brick);border-radius:var(--radius);padding:8px 12px;font-size:13px;cursor:pointer;';
    del.addEventListener('click', () => {
      if (confirm(`${p.name} wirklich löschen? Alle Zählstände gehen verloren.`)) {
        send({ type: 'deletePlayer', id: p.id });
      }
    });
    delCell.appendChild(del);

    row.append(nameCell, stepper('beer', p.beers, 'amber', 'bg'), stepper('shot', p.shots, 'brick', 'ink'), total, delCell);
    box.appendChild(row);
  }
}

// --- Neuer Nutzer ---
$('open-add').addEventListener('click', () => {
  $('add-form').reset();
  $('add-modal').hidden = false;
  $('add-name').focus();
});
$('close-add').addEventListener('click', () => { $('add-modal').hidden = true; });
$('add-form').addEventListener('submit', (e) => {
  e.preventDefault();
  send({ type: 'addPlayer', name: $('add-name').value, pin: $('add-pin').value });
  $('add-modal').hidden = true;
});

// --- PIN-Reset ---
let pinPlayerId = null;
function openPinModal(p) {
  pinPlayerId = p.id;
  $('pin-name').textContent = p.name;
  $('pin-form').reset();
  $('pin-modal').hidden = false;
  $('pin-value').focus();
}
$('close-pin').addEventListener('click', () => { $('pin-modal').hidden = true; });
$('pin-form').addEventListener('submit', (e) => {
  e.preventDefault();
  send({ type: 'setPin', id: pinPlayerId, pin: $('pin-value').value });
  $('pin-modal').hidden = true;
});

// --- Gedrückt halten: Komplett-Reset ---
let holdTimer = null;
function startHold() {
  stopHold();
  let progress = 0;
  holdTimer = setInterval(() => {
    progress += 100 / 40; // ~1,2 Sekunden halten
    if (progress >= 100) {
      stopHold();
      send({ type: 'reset', confirm: 'RESET' });
      $('reset-done').hidden = false;
      setTimeout(() => { $('reset-done').hidden = true; }, 2000);
    } else {
      $('hold-progress').style.width = `${progress}%`;
    }
  }, 30);
}
function stopHold() {
  clearInterval(holdTimer);
  holdTimer = null;
  $('hold-progress').style.width = '0%';
}
const resetBtn = $('reset-btn');
resetBtn.addEventListener('mousedown', startHold);
resetBtn.addEventListener('mouseup', stopHold);
resetBtn.addEventListener('mouseleave', stopHold);
resetBtn.addEventListener('touchstart', startHold);
resetBtn.addEventListener('touchend', stopHold);

// Bereits angemeldet? (Token überlebt Reload in der Session)
if (token) enterDashboard();
</script>
</body>
</html>
